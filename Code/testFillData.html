<script>

    if (t)

        tdStyle: "", //td样式

        id: "myCellDesigner1", instanceName: "myCell1", workbook: myTestData1, parentEl: document.getElementById("viewContent"), dwEdit: null,

        isDisplayLabel: true,
        isDisplayTabBar: true,
        isEnableTools: true,
        toolbarThemeConfig: toolbarThemeConfig,
        labelThemeConfig: labelThemeConfig,
        tabBarThemeConfig: tabBarThemeConfig,
        contextMenuThemeConfig: contextMenuThemeConfig,
        dialogThemeConfig: dialogThemeConfig,
        isNeedFillData: true       
    });
    if (false) {
        window.myCell1.DoJob();
    }
    else {
        testFillData();
    }

    function testFillData() {
        // 创建报告模板列表
        var reportTemplateList = [];
        var t1 = {
            fileKey: "4",
            jsonStr: templateJsonStr
        };
        reportTemplateList.push(t1);

        // 创建模板打印参数  
        var t2 = {
            coverLines: 0,
            reportBodyList: [],
            fileKey: "4",
            recordPerPage: 1,
            coverUseBodyRecordCount: 0,
            isPrintBodyContinious: "否",
            needCombinColumns: "",
            tablesUsedToRecordCount: "table1"
        };
        var reportTemplatePrintParamList = [t2];

        // 创建打印预定参数  
        var fillReportSysInfo = {
            blankFillStr: "",
            dateFormat: "yyyy-MM-dd",
            dateTimeFormat: "yyyy-MM-dd HH:mm:ss",
            timeFormat: "HH:mm:ss",
            emptyFillStrH: "以下空白",
            emptyFillStrV: "以后空白",
            fillBodyBlankType: FillBodyBlankType.默认,
            fillXuHaoType: FillXuHaoType.默认,
            floatSealInfoList: [],
            signNameInfoList: []
        };

        // 创建签名信息  
        var signNameInfo = {
            position: SignNamePosition.仅签名图片,
            relTableNameAndColumn: "OA_AHHS_SH_HGZ.qrbarcode",
            imagePath: "",
            isNeedSplitCell: false
        };
        fillReportSysInfo.signNameInfoList.push(signNameInfo);

        var fillDataObj = window.myCell1.GetFillDataObj();
        fillDataObj.DoJob({
            jsonDataStr: JSON.stringify(getTestCalculateData()),
            reportTemplateList: reportTemplateList,
            reportTemplateConditionInfoList: [],
            reportTemplatePrintParamList: reportTemplatePrintParamList,
            fillReportSysInfo: fillReportSysInfo
        });

        setupAutoComplete();
    }

    function setupAutoComplete() {
        let L = [
            {
                tableAndColumn: 'jc_testtask.testunit',                
                configDetail: {
                    isDropDownListBox: true,
                    apiUrl: 'http://localhost:21010/api/example/Jc_comman/ddxyz',
                    columnInfoList: [{ columnName: 'testunit', columnChName: '检验单位', width: 300 }],
                    valueColumnMaps: [{ source: 'testunit', target: 'jc_testtask.testunit' }],
                },
            },
            {
                tableAndColumn: 'jc_testtask.testtype',
                configDetail: {
                    isDropDownListBox: true,
                    apiUrl: 'http://localhost:21010/api/example/Jc_comman/ddxyz',
                    columnInfoList: [{ columnName: 'testtype', columnChName: '检测类型', width: 300 }],
                    valueColumnMaps: [{ source: 'testtype', target: 'jc_testtask.testtype' }],
                },
            },
            {
                tableAndColumn: 'jc_testtask.entrustunitname',
                configDetail: {
                    apiUrl: 'http://localhost:21010/api/example/Jc_comman/ddxyz',
                    columnInfoList: [
                        { columnName: 'entrustunitname', columnChName: '委托单位', width: 300 },

                        { source: 'entrustunitlinkmantel', target: 'jc_testtask.entrustunitlinkmantel' },
                        { source: 'entrustunitaddress', target: 'jc_testtask.entrustunitaddress' },
                    ],
                },

        ];

        myCell1.SetupAutoComplete(L);
    }
